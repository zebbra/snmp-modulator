  #     try:
  #       - SNMPV3_FORTINET

  # Tag a device "discover" to trigger blind auth + module discovery.
  # auth.try: _ALL overrides global auth_policy=use — probes every known auth profile.
  # modules.try: _ALL probes every module known to snmp-exporter.
  # On success: remove tags. On fail: add fixme-snmp for manual follow-up.
  - name: "Last-resort discovery (tag-driven)"
    match:
      tags: "discover"
    auth:
      try:
        - _ALL
    modules:
      try:
        - _ALL
    on_success:
      remove_tag:
      #   - discover
        - fixme-snmp
    on_fail:
      add_tag:
        - fixme-snmp

